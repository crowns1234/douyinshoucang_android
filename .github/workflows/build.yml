name: Build APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          buildozer_spec: buildozer.spec

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ShiGuang-APK
          path: bin/*.apk
