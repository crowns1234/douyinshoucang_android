name: Build APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download FFmpeg for Android
        run: |
          wget -q -O ffmpeg-arm64.zip "https://github.com/Tyrrrz/FFmpegBin/releases/download/8.1.2/ffmpeg-android-arm64.zip" || \
          curl -sSL -o ffmpeg-arm64.zip "https://github.com/Tyrrrz/FFmpegBin/releases/download/8.1.2/ffmpeg-android-arm64.zip"
          unzip -o ffmpeg-arm64.zip -d /tmp/ffmpeg
          cp /tmp/ffmpeg/ffmpeg-*/ffmpeg ./ffmpeg_bin 2>/dev/null || cp /tmp/ffmpeg/ffmpeg ./ffmpeg_bin 2>/dev/null
          chmod +x ./ffmpeg_bin 2>/dev/null
          ls -lh ./ffmpeg_bin 2>/dev/null || echo "FFmpeg download failed, will build without transcription"

      - name: Install JDK & buildozer
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk autoconf automake libtool unzip zip
          pip install --upgrade buildozer cython virtualenv

      - name: Build APK
        run: |
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ShiGuang-APK
          path: bin/*.apk
