name: Build APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

      - name: Download FFmpeg for Android
        run: |
          wget -q -O ffmpeg-arm64.zip "https://github.com/Tyrrrz/FFmpegBin/releases/download/8.1.2/ffmpeg-android-arm64.zip" || \
          curl -sSL -o ffmpeg-arm64.zip "https://github.com/Tyrrrz/FFmpegBin/releases/download/8.1.2/ffmpeg-android-arm64.zip"
          unzip -o ffmpeg-arm64.zip -d /tmp/ffmpeg
          cp /tmp/ffmpeg/ffmpeg-*/ffmpeg ./ffmpeg_bin 2>/dev/null || cp /tmp/ffmpeg/ffmpeg ./ffmpeg_bin 2>/dev/null
          chmod +x ./ffmpeg_bin 2>/dev/null
          ls -lh ./ffmpeg_bin 2>/dev/null || echo "FFmpeg download failed, will build without transcription"

      - name: Install JDK & buildozer
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk ca-certificates-java autoconf automake libtool unzip zip
          sudo update-ca-certificates -f 2>/dev/null || true
          pip install --upgrade buildozer cython virtualenv
          # Free up disk space
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          df -h /

      - name: Build APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          yes | buildozer android debug 2>&1 | tail -500
          echo "=== APK files ==="
          find bin/ -name '*.apk' -ls 2>/dev/null || echo "No APK found in bin/"
          df -h /

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ShiGuang-APK
          path: bin/**/*.apk
