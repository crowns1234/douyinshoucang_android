name: Build APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download FFmpeg for Android
        run: |
          curl -sL -o ffmpeg-arm64.zip "https://github.com/Tyrrrz/FFmpegBin/releases/download/8.1.2/ffmpeg-android-arm64.zip"
          unzip -o ffmpeg-arm64.zip -d /tmp/ffmpeg
          cp /tmp/ffmpeg/ffmpeg-*/ffmpeg ./ffmpeg_bin
          chmod +x ./ffmpeg_bin
          ls -lh ./ffmpeg_bin

      - name: Install JDK & buildozer
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk autoconf automake libtool unzip zip
          pip install buildozer cython

      - name: Build APK
        run: |
          export ANDROID_HOME=~/.buildozer/android/platform/android-sdk
          export ANDROID_NDK_HOME=~/.buildozer/android/platform/android-ndk-r25b
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ShiGuang-APK
          path: bin/*.apk
